services:
  - type: web
    name: zam-api
    runtime: python
    rootDir: back_end
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_AUTH_REQUIRED
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
