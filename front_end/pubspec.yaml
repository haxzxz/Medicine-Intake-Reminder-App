name: zam_medicine_reminder
description: Zam - AI-Powered Medicine Reminder Assistant
publish_to: 'none'
version: 1.2.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # API calls (Gemini)
  http: ^1.3.1

  # Speech recognition (voice input)
  speech_to_text: ^7.0.0

  # Scheduled local notifications / alarms
  flutter_local_notifications: ^17.2.4

  # Runtime permissions
  permission_handler: ^11.3.1

  # Persist reminders across sessions
  shared_preferences: ^2.5.2

  # Date formatting
  intl: ^0.19.0

  # Timezone support
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

  # Load API key from .env — never hardcoded in source
  flutter_dotenv: ^5.2.1

  # Firebase core (required for all Firebase services)
  firebase_core: ^4.4.0

  # Google Sign-In
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/zam_launcher_icon.png"

  # Adaptive Icon
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/zam_launcher_icon_foreground.png"
  adaptive_icon_foreground_inset: 16

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/font/Montserrat-Bold.ttf
        - asset: assets/font/Montserrat-SemiBold.ttf
        - asset: assets/font/Montserrat-Regular.ttf
        - asset: assets/font/Montserrat-Medium.ttf
        - asset: assets/font/Montserrat-Italic.ttf
        - asset: assets/font/Montserrat-Thin.ttf
